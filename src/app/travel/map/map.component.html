<div #mapContainer class="map-inner"></div>

<div class="crosshair-overlay" *ngIf="selectionMode">
  <div class="crosshair-v"></div>
  <div class="crosshair-h"></div>
  <div class="crosshair-dot"></div>
  <div class="crosshair-label">
    Move the map to set {{ selectionMode === 'pickup' ? 'pickup' : 'destination' }}
  </div>
  <button class="confirm-btn" (click)="onConfirmSelection()">
    Confirm {{ selectionMode === 'pickup' ? 'Pickup' : 'Destination' }}
  </button>
</div>
